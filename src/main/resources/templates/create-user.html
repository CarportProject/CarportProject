<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Opret bruger – Johannes Fog</title>
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">

        <!-- Logo -->
        <a href="/" class="login-logo" aria-label="Johannes Fog - gå til forside">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60" aria-hidden="true">
                <rect width="60" height="60" fill="#013d7a"/>
                <text x="50%" y="58%" dominant-baseline="middle" text-anchor="middle"
                      fill="#ffffff" font-family="helvetica,arial,sans-serif" font-weight="bold" font-size="22">FOG</text>
            </svg>
        </a>

        <h1 class="login-heading">Opret bruger</h1>
        <p class="login-subheading">Udfyld oplysningerne nedenfor</p>

        <form class="login-form" th:action="@{/create-user}" method="post">

            <div class="login-field">
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Mailadresse"
                    autocomplete="email"
                    required
                >
            </div>

            <div class="login-field">
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Adgangskode"
                    autocomplete="new-password"
                    required
                >
            </div>

            <div class="login-field">
                <input
                    type="password"
                    id="confirmPassword"
                    name="confirmPassword"
                    placeholder="Bekræft adgangskode"
                    autocomplete="new-password"
                    required
                >
            </div>

            <p th:if="${error}" th:text="${error}" class="error-message"></p>

            <button type="submit" class="login-btn">Opret bruger</button>

            <p class="login-switch">Har du allerede en bruger? <a th:href="@{/login-page}">Log på her</a></p>

        </form>

    </div>
</div>

</body>
</html>
